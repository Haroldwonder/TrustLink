name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write    # Required for OIDC-based npm provenance and SLSA attestations
  attestations: write # Required for actions/attest-build-provenance

jobs:
  build-and-publish:
    name: Build WASM and Publish Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        run: rustup show

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Optimize WASM
        run: |
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/trustlink.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/trustlink.optimized.wasm

      - name: Install wasm-tools
        run: cargo install --locked wasm-tools

      - name: Validate WASM binaries
        run: |
          wasm-tools validate target/wasm32-unknown-unknown/release/trustlink.wasm
          wasm-tools validate target/wasm32-unknown-unknown/release/trustlink.optimized.wasm

      - name: Verify WASM artifacts
        run: |
          ls -lh target/wasm32-unknown-unknown/release/trustlink.wasm
          ls -lh target/wasm32-unknown-unknown/release/trustlink.optimized.wasm
          file target/wasm32-unknown-unknown/release/trustlink.wasm
          file target/wasm32-unknown-unknown/release/trustlink.optimized.wasm

      - name: Generate Rust SBOM (CycloneDX)
        run: |
          cargo install --locked cargo-cyclonedx
          cargo cyclonedx --format json --all
          # cargo-cyclonedx outputs <crate>.cdx.json; rename for clarity
          mv trustlink.cdx.json trustlink-sbom.cdx.json || \
            find . -maxdepth 2 -name "*.cdx.json" -exec mv {} trustlink-sbom.cdx.json \;
          echo "Rust SBOM generated:"
          ls -lh trustlink-sbom.cdx.json

      - name: Attest WASM build provenance (SLSA)
        uses: actions/attest-build-provenance@1c608b9e2f18e8526c3a22e876069cd30da2b2ac # v1.4.4
        with:
          subject-path: |
            target/wasm32-unknown-unknown/release/trustlink.wasm
            target/wasm32-unknown-unknown/release/trustlink.optimized.wasm

      - name: Upload WASM artifact to release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            target/wasm32-unknown-unknown/release/trustlink.wasm
            target/wasm32-unknown-unknown/release/trustlink.optimized.wasm
            trustlink-sbom.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release summary
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### WASM Binaries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **trustlink.wasm** (unoptimized)" >> $GITHUB_STEP_SUMMARY
          echo "  - Size: $(du -h target/wasm32-unknown-unknown/release/trustlink.wasm | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **trustlink.optimized.wasm** (optimized)" >> $GITHUB_STEP_SUMMARY
          echo "  - Size: $(du -h target/wasm32-unknown-unknown/release/trustlink.optimized.wasm | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SBOM" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **trustlink-sbom.cdx.json** — CycloneDX SBOM for the Rust contract" >> $GITHUB_STEP_SUMMARY
          echo "- **trustlink-sdk-sbom.cdx.json** — CycloneDX SBOM for the TypeScript SDK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Supply Chain Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SLSA provenance attestations are recorded in the repository's attestations." >> $GITHUB_STEP_SUMMARY
          echo "Verify with: \`gh attestation verify <artifact> --repo ${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "See [docs/slsa-provenance.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/slsa-provenance.md) for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use the optimized WASM for production deployments." >> $GITHUB_STEP_SUMMARY
          echo "See [DEPLOYMENT.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/DEPLOYMENT.md) for instructions." >> $GITHUB_STEP_SUMMARY

  publish-typescript-sdk:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: 'sdk/typescript/package-lock.json'

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          # Extract version from git tag (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        working-directory: sdk/typescript
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          echo "Updated package.json to version ${{ steps.version.outputs.version }}"

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: npm run build

      - name: Verify build output
        working-directory: sdk/typescript
        run: |
          echo "Build output:"
          ls -la dist/
          echo "Package contents:"
          npm pack --dry-run

      - name: Generate TypeScript SDK SBOM (CycloneDX)
        working-directory: sdk/typescript
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file ../../trustlink-sdk-sbom.cdx.json \
            --package-lock-only
          echo "TypeScript SDK SBOM generated:"
          ls -lh ../../trustlink-sdk-sbom.cdx.json

      - name: Publish to npm
        working-directory: sdk/typescript
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attest TypeScript SDK build provenance (SLSA)
        uses: actions/attest-build-provenance@1c608b9e2f18e8526c3a22e876069cd30da2b2ac # v1.4.4
        with:
          subject-path: trustlink-sdk-sbom.cdx.json

      - name: Upload TypeScript SDK SBOM to release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: trustlink-sdk-sbom.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### TypeScript SDK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **@trustlink/sdk@${{ steps.version.outputs.version }}** published to npm" >> $GITHUB_STEP_SUMMARY
          echo "- Install: \`npm install @trustlink/sdk@${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- [View on npm](https://www.npmjs.com/package/@trustlink/sdk)" >> $GITHUB_STEP_SUMMARY
