name: Deploy React dApp to GitHub Pages

on:
  push:
    branches: [main]
    paths: [examples/react-app/**]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/react-app/package-lock.json

      - name: Install dependencies
        working-directory: examples/react-app
        run: npm ci

      - name: Build
        working-directory: examples/react-app
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
        run: |
          export VITE_CONTRACT_ID="${VITE_CONTRACT_ID:-}"
          export VITE_RPC_URL="${VITE_RPC_URL:-https://soroban-testnet.stellar.org}"
          npm run build

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-build dApp files"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: examples/react-app/dist
