name: Deploy React dApp to GitHub Pages

on:
  push:
    branches: [main]
    paths: [examples/react-app/**]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7 # v3.8.2
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/react-app/package-lock.json

      - name: Install dependencies
        working-directory: examples/react-app
        run: npm ci

      - name: Build
        working-directory: examples/react-app
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID || '' }}
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL || 'https://soroban-testnet.stellar.org' }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: examples/react-app/dist
